# ══════════════════════════════════════════════════════════════
# NetSentinel — Model Configuration
# ══════════════════════════════════════════════════════════════

project:
  name: "NetSentinel"
  experiment_name: "network_anomaly_detection"
  random_state: 42

data:
  processed_path: "data/processed"
  test_size: 0.2

models:
  isolation_forest:
    contamination: 0.1
    n_estimators: 200
    max_samples: "auto"
    random_state: 42

  random_forest:
    n_estimators: 200
    max_depth: 20
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 300
    max_depth: 10
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

  autoencoder:
    encoding_dim: 16
    hidden_layers: [64, 32]
    epochs: 50
    batch_size: 256
    learning_rate: 0.001
    validation_split: 0.1
    threshold_percentile: 95

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc
  cv_folds: 5