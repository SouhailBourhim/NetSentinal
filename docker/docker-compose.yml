# ═══════════════════════════════════════════════════
# NetSentinel — Docker Compose
# Runs both API and Dashboard together
# ═══════════════════════════════════════════════════
version: '3.8'

services:
  api:
    build: .
    container_name: netsentinel-api
    ports:
      - "8000:8000"
    volumes:
      - ./saved_models:/app/saved_models
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: netsentinel-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./saved_models:/app/saved_models
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api